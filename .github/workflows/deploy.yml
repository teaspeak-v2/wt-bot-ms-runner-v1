# Build, push to GHCR, and deploy to production VM via SSH.
# Triggers on push to main and on manual dispatch.
name: Build & Deploy

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/lbenicio/ms-runner-v1:latest
  COMPOSE_SERVICES: runner

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout service repo
        uses: actions/checkout@v4

      - name: Checkout deploy repo (for docker-compose.yml)
        uses: actions/checkout@v4
        with:
          repository: teaspeak-v2/wt-bot-deploy
          path: deploy
          token: ${{ secrets.DEPLOY_REPO_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./deployments/Dockerfile
          push: true
          tags: |
            ghcr.io/lbenicio/ms-runner-v1:latest
            ghcr.io/lbenicio/ms-runner-v1:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/lbenicio/ms-runner-v1:latest
          cache-to: type=inline

      - name: SCP compose file to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "deploy/docker-compose.yml,deploy/scripts/deploy-service.sh"
          target: "/opt/guildstack"
          strip_components: 1

      - name: Deploy service on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            chmod +x /opt/guildstack/scripts/deploy-service.sh
            for svc in ${{ env.COMPOSE_SERVICES }}; do
              /opt/guildstack/scripts/deploy-service.sh "$svc"
            done
